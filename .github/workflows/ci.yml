name: CI



on:

  push:

    branches: [main]

  pull_request:



jobs:

  check:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout code

        uses: actions/checkout@v4



      - name: Set up Node.js

        uses: actions/setup-node@v6

        with:

          node-version: 20

          cache: npm



      - name: Install dependencies

        run: npm ci



      - name: Check formatting

        run: npm run format:check



      - name: Run lint

        run: npm run lint



      - name: Type check

        run: npx tsc --noEmit



      - name: Build

        run: npm run build
